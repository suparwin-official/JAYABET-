version: "3.8"

services:
  backend:
    build: ./backend
    container_name: jayabet_backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always

  redis:
    image: redis:7
    container_name: jayabet_redis
    ports:
      - "6379:6379"
    restart: always
